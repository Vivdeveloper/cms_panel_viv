# NGINX SECURITY RULES FOR CMS
# If you ever migrate away from Hostinger/cPanel to an Nginx server,
# you must include these rules in your Nginx server block to prevent
# severe data leaks of your JSON database files.

location ^~ /pages_data/ {
    deny all;
    return 403;
}

location ^~ /users_data/ {
    deny all;
    return 403;
}

location ^~ /uploads/ {
    # Prevent execution of PHP files in uploads
    location ~ \.php$ {
        deny all;
        return 403;
    }
}

# Block direct access to any remaining .json files (like cache)
location ~ \.json$ {
    deny all;
    return 403;
}
